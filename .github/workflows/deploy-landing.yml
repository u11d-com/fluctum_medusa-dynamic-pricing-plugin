name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - "landing-page/www/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Build and Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    # Ensure only one deployment runs at a time
    concurrency:
      group: deploy-landing-page
      cancel-in-progress: false

    defaults:
      run:
        working-directory: landing-page/www

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: landing-page/www/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_WEBFORM_URL: ${{ secrets.NEXT_PUBLIC_WEBFORM_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt"

          # HTML, JSON, and text files get shorter cache (for potential dynamic updates)
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "public, max-age=3600, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "📦 Bucket: ${{ secrets.S3_BUCKET }}"
          echo "🌐 Distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "⏰ Cache invalidation in progress (2-5 minutes)"
