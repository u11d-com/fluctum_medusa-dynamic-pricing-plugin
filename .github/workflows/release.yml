name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (true/false)"
        required: false
        default: "false"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: dynamic-pricing-plugin/package-lock.json
      - name: Validate tag matches plugin version
        if: ${{ github.event_name == 'push' }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./dynamic-pricing-plugin/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match dynamic-pricing-plugin/package.json version ($PKG_VERSION)"
            exit 1
          fi
      - run: npm ci --workspaces=false --legacy-peer-deps
        working-directory: dynamic-pricing-plugin
      - run: npm run test:unit
        working-directory: dynamic-pricing-plugin
      - run: npm run build
        working-directory: dynamic-pricing-plugin
      - run: npm pack --dry-run
        working-directory: dynamic-pricing-plugin
      - run: npm publish --access public --provenance
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        working-directory: dynamic-pricing-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
