<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #000000;
        color: #fff;
        padding: 20px;
        text-align: center;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
        border: 1px solid #ddd;
      }
      .field {
        margin-bottom: 15px;
      }
      .label {
        font-weight: bold;
        color: #555;
      }
      .value {
        color: #000;
      }
      .footer {
        text-align: center;
        padding: 20px;
        color: #999;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          alt="Fluctum Logo"
          height="60"
          src="https://fluctum.io/fluctum-logo-full.svg"
        />
      </div>
      <div class="content">
        <h2>New Contact Form Submission</h2>

        <div class="field">
          <span class="label">From:</span>
          <span class="value">{{ fullName }} ({{ email }})</span>
        </div>
        <div class="field">
          <span class="label">Message:</span><br />
          <span class="value">{{ message }}</span>
        </div>
      </div>
      <div class="footer">
        This is an automated notification from your contact form.
      </div>
    </div>
  </body>
</html>
